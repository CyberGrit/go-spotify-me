name: Run linters
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.24.2
    - name: lint
      uses: golangci/golangci-lint-action@v9
